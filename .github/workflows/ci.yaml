name: Calculator CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ variables.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ variables.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT: ${{ variables.AZURE_OPENAI_DEPLOYMENT }}
      OPENAI_API_VERSION: ${{ variables.OPENAI_API_VERSION }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest tests --verbose

    - name: Run sample.py
      run: python sample.py